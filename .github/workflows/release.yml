name: Release

# Build the app and publish a downloadable .dmg whenever you push a version tag,
# e.g.  git tag v1.0.0  &&  git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'
  # Lets you trigger a build by hand from the Actions tab (no release attached).
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: macos-15   # ships with Xcode 16 (Swift 6)
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build app and package .dmg
        run: ./scripts/build-and-package.sh

      - name: Publish the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/FriendlyTerminal.dmg
          body: |
            ### Install

            1. Download **FriendlyTerminal.dmg** below.
            2. Open it, then drag **FriendlyTerminal** into the **Applications** folder.
            3. The first time you launch it, **right-click the app → Open**, then
               click **Open** in the dialog. You only have to do this once — it's
               because the app isn't notarized by Apple.
